{% extends "base.html" %}

{% block title %}Cadastro{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 400px;">
    <div class="card p-4">
        <h2 class="text-center mb-4">Cadastro</h2>
        <form method="POST">
            <input type="text" name="username" class="form-control mb-2" placeholder="Usuário" required>
            <input type="password" name="password" class="form-control mb-2" placeholder="Senha" required>
            <button class="btn btn-primary w-100">Cadastrar</button>
        </form>
        <p class="mt-3 text-center">Já tem conta? <a href="/login">Faça login</a></p>
    </div>
</div>
{% endblock %}
